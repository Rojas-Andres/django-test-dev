AWSTemplateFormatVersion: "2010-09-09"
Description: ECS Cluster with Fargate and Load Balancer

Parameters:
  # Environment selector. Drives the SSM parameter paths below
  # (e.g. /django/dev/... ). Override at deploy time for other environments,
  # passing the matching /django/<env>/... paths for the SSM-backed values.
  Environment:
    Description: Deployment environment (dev, staging, prod)
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  BucketName:
    Description: SSM path for the S3 bucket name
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/bucket-name
  StackName:
    Description: SSM path for the stack name
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/stack-name
  VPCId:
    Description: SSM path for the VPC id
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/vpc-id
  PublicSubnetOne:
    Description: SSM path for the first public subnet
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/public-subnet-one
  PublicSubnetTwo:
    Description: SSM path for the second public subnet
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/public-subnet-two
  PrivateSubnetOne:
    Description: SSM path for the first private subnet
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/private-subnet-one
  PrivateSubnetTwo:
    Description: SSM path for the second private subnet
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/private-subnet-two
  ArnCertificateACM:
    Description: SSM path for the ACM certificate ARN
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/arn-certificate-acm
  EcrRepositoryDjango:
    Description: SSM path for the Django ECR repository
    Type: AWS::SSM::Parameter::Value<String>
    Default: /django/dev/ecr-repository-django

Resources:

  BucketS3InputDataAssets:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketName}-s3-assets-${Environment}"
      CorsConfiguration:
        CorsRules:
          - AllowedMethods:
              - GET
              - HEAD
              - POST
              - PUT
            AllowedOrigins:
              - "*"
            AllowedHeaders:
              - "*"
            MaxAge: 300
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessIdentityBucketIDP:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: "Origin Access Identity for Bucket IDP"

  BucketIDPAssetsPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BucketS3InputDataAssets
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentityBucketIDP.S3CanonicalUserId
            Action: "s3:GetObject"
            Resource: !Sub "${BucketS3InputDataAssets.Arn}/*"
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentityBucketIDP.S3CanonicalUserId
            Action:
              - "s3:GetBucket*"
              - "s3:GetObject*"
              - "s3:List*"
            Resource:
              - !Sub "${BucketS3InputDataAssets.Arn}"
              - !Sub "${BucketS3InputDataAssets.Arn}/*"

  DistributionBucketIDP:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt BucketS3InputDataAssets.DomainName
            Id: "S3Origin"
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${OriginAccessIdentityBucketIDP}"
        DefaultCacheBehavior:
          TargetOriginId: "S3Origin"
          ViewerProtocolPolicy: "redirect-to-https"
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
        Enabled: true


  PrivateDnsNamespaceVpc:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub ${StackName}${Environment}PrivateDnsNamespace
      Vpc: !Ref VPCId
      Description: "Private DNS namespace for tutorial service discovery"


  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${StackName}${Environment}EcsCluster"


  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AmazonECSTaskExecutionRolePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: "*"

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound traffic on port 8080, 8081, 443
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${StackName}${Environment}ALB"
      Subnets:
        - !Ref PublicSubnetOne
        - !Ref PublicSubnetTwo
      SecurityGroups:
        - !Ref SecurityGroup
      Scheme: internet-facing


  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: 200
            ContentType: text/plain
            MessageBody: 'OK'
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-2016-08
      Certificates:
        - CertificateArn: !Ref ArnCertificateACM
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupDjango

  ####  Django SERVICE CONFIGURATION

  TaskDefinitionDjango:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackName}${Environment}TaskFamilyDjango"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "2048"
      Memory: "4096"
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsExecutionRole.Arn
      ContainerDefinitions:
        - Name: api-django
          Image: !Ref EcrRepositoryDjango
          Cpu: 0
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupDjango
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          PortMappings:
            - ContainerPort: 8000
              HostPort: 8000
              Protocol: tcp
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:8000/healtcheck/ || exit 1"
            Interval: 60
            Timeout: 30
            Retries: 3
            StartPeriod: 30
          Environment:
            - Name: ENV_AWS_BUCKET_NAME
              Value: !Sub "${BucketName}-s3-assets-${Environment}"
            - Name: REGION_BUCKET
              Value: !Ref AWS::Region
            - Name: ENV_AWS_REGION
              Value: !Ref AWS::Region
            - Name: CLOUDFRONT_URL
              Value: !Sub "https://${DistributionBucketIDP.DomainName}"
            - Name: BUCKET_NAME
              Value: !Sub "${BucketName}-s3-assets-${Environment}"

  TargetGroupDjango:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${StackName}TGDjango"
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VPCId
      TargetType: ip
      HealthCheckPath: /healtcheck/
      # HealthCheckIntervalSeconds: 60  # Intervalo de 60 segundos entre comprobaciones
      # HealthCheckTimeoutSeconds: 15  # Tiempo de espera para cada comprobación de salud
      # UnhealthyThresholdCount: 3      # Número de fallos consecutivos antes de marcar como no saludable
      # HealthyThresholdCount: 5       # Número de éxitos consecutivos antes de marcar como saludable

  ListenerDjango:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 8000
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupDjango

  PrivateDnsServiceDjango:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: !Sub "${StackName}${Environment}DjangoService"
      NamespaceId: !Ref PrivateDnsNamespaceVpc
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1


  FargateServiceDjango:
    Type: AWS::ECS::Service
    DependsOn:
      - ListenerDjango
      - TargetGroupDjango
    Properties:
      ServiceName: !Sub "${StackName}${Environment}DjangoService"
      Cluster: !Ref EcsCluster
      DesiredCount: 1
      TaskDefinition: !Ref TaskDefinitionDjango
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PublicSubnetOne
            - !Ref PublicSubnetTwo
          SecurityGroups:
            - !Ref SecurityGroup
          AssignPublicIp: ENABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PrivateDnsServiceDjango.Arn
          ContainerName: api-django
      LoadBalancers:
        - ContainerName: api-django
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroupDjango
      EnableExecuteCommand: true

  LogGroupDjango:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${StackName}${Environment}EcsClusterDjango"
      RetentionInDays: 14
